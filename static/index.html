<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>戦国人物データベース</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: system-ui, sans-serif;
  margin: 0;
  padding: 10px;
  font-size: 16px;
  background: #f7f7f7;
}

/* カード */
.card {
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  background: #fff;
}

.info-box {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-bottom: 8px;
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fff;
}

.card-title {
  font-weight: bold;
  font-size: 18px;
}

/* ボタン */
.btn {
  padding: 10px;
  margin-top: 6px;
  width: 100%;
  font-size: 16px;
}

/* 入力 */
input, select, textarea {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-bottom: 8px;
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 6px;
}


/* モーダル */
#detailModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}
#detailContent {
  background: #fff;
  padding: 16px;
  border-radius: 12px;
  width: 95%;
  max-height: 90%;
  overflow: auto;
}

/* 共通 */
.link-like {
  color: blue;
  text-decoration: underline;
  cursor: pointer;
}

.autocomplete-box {
  border: 1px solid #ccc;
  background: #fff;
  display: none;
  max-height: 200px;
  overflow-y: auto;
  position: absolute;
  width: 100%;
  z-index: 1000;
  box-sizing: border-box;
}

.autocomplete-item {
  padding: 8px;
  cursor: pointer;
}

.autocomplete-item:hover {
  background: #eef;
}

.autocomplete-container {
  position: relative;
}

/* 家系 */
.children { display: none; margin-left: 20px; }
.toggle { cursor: pointer; }

/* ヘッダー固定 */
h1 {
  position: sticky;
  top: 0;
  background: #fff;
  padding: 10px 0;
}

/* PC */
@media (min-width: 768px) {
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn { width: auto; }
}


.form-grid > div {
  width: 100%;
}

.form-grid select {
  width: 100%;
  height: 46px;
  padding: 10px;
  font-size: 16px;
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.large-text {
  min-height: 250px;
}

.long-field {
  width: 100%;
  margin-bottom: 12px;
}

.memo-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  width: 100%;
}

#memoSection textarea {
  width: 100%;
  min-height: 250px;
}

.save-area {
  text-align: center;
  margin-top: 20px;
  margin-bottom: 20px;
}

.save-btn {
  width: 250px;
}



h3 {
  margin-top: 12px;
  border-bottom: 1px solid #ccc;
  padding-bottom: 4px;
}
</style>
</head>

<body>

<h1>戦国人物データベース</h1>

<input id="search" placeholder="検索">
<button class="btn" onclick="searchPersons()">検索</button>

<hr>

<h2>登録</h2>
<input id="personId" type="hidden">

<h3>基本情報</h3>

<div class="form-grid">
  <div>
    <label for="name">名前</label>
    <input id="name">
  </div>
  <div>
    <label for="yomi">よみ</label>
    <input id="yomi">
  </div>
  <div>
    <label for="birth">生年</label>
    <input id="birth">
  </div>
  <div>
    <label for="death">没年</label>
    <input id="death">
  </div>
  <div>
    <label for="childhood_name">幼名</label>
    <input id="childhood_name">
  </div>
  <div>
    <label for="imina">諱</label>
    <input id="imina">
  </div>
  <div>
    <label for="tsusho">通称</label>
    <input id="tsusho">
  </div>
  <div>
    <label for="hogou">法号</label>
    <input id="hogou">
  </div>
  <div>
    <label for="origin">出身</label>
    <input id="origin">
  </div>
  <div>
    <label for="category">分類</label>
    <select id="category">
      <option value="">--分類--</option>
      <option>戦国大名</option>
      <option>国衆</option>
      <option>家臣</option>
      <option>僧・文化人</option>
      <option>その他</option>
    </select>
  </div>
  <div>
    <label for="affiliation">所属</label>
    <input id="affiliation">
  </div>
  <div>
    <label for="castle">居城</label>
    <input id="castle">
  </div>
  <div>
    <label for="rank">官位</label>
    <input id="rank">
  </div>
  <div>
    <label for="office">官職</label>
    <input id="office">
  </div>
</div>

  
<div class="long-field">
  <label for="history">戦歴</label>
  <textarea id="history"></textarea>
</div>

<div class="long-field">
  <label for="description">説明</label>
  <textarea id="description"></textarea>
</div>

<div class="long-field">
  <label for="source">出典</label>
  <textarea id="source"></textarea>
</div>


<h3>家族関係</h3>

<div class="form-grid">

  <div class="autocomplete-container">
    <label for="father_name">父</label>
    <input id="father_name" autocomplete="off">
    <div id="father_suggest" class="autocomplete-box"></div>
  </div>

  <div class="autocomplete-container">
    <label for="mother_name">母</label>
    <input id="mother_name" autocomplete="off">
    <div id="mother_suggest" class="autocomplete-box"></div>
  </div>

  <div>
    <label>子供</label>
    <div class="info-box">
      <div id="childrenList">-</div>
    </div>
  </div>

  <div>
    <label>兄弟姉妹</label>
    <div class="info-box">
      <div id="siblingsList">-</div>
    </div>
  </div>

</div>

<h3 onclick="toggleMemo()">メモ（クリックで開閉）</h3>

<div id="memoSection" class="memo-grid">

  <div>
    <label>メモ①（『戦国人名辞典』吉川弘文館）</label>
    <textarea id="memo1"></textarea>
  </div>
  <div>
    <label>メモ②（『戦国人名事典』新人物往来社）</label>
    <textarea id="memo2"></textarea>
  </div>
  <div>
    <label>メモ③（『戦国大名家臣団事典 東国編』新人物往来社）</label>
    <textarea id="memo3"></textarea>
  </div>
  <div>
    <label>メモ④（『戦国大名家臣団事典 西国編』新人物往来社）</label>
    <textarea id="memo4"></textarea>
  </div>
  <div>
    <label>メモ⑤（ ）</label>
    <textarea id="memo5"></textarea>
  </div>
  <div>
    <label>メモ⑥（ ）</label>
    <textarea id="memo6"></textarea>
  </div>
  <div>
    <label>メモ⑦（ ）</label>
    <textarea id="memo7"></textarea>
  </div>
  <div>
    <label>メモ⑧（ ）</label>
    <textarea id="memo8"></textarea>
  </div>
  <div>
    <label>メモ⑨（ ）</label>
    <textarea id="memo9"></textarea>
  </div>
  <div>
    <label>メモ⑩（ ）</label>
    <textarea id="memo10"></textarea>
  </div>

</div>

<div class="save-area">
  <button class="btn save-btn" onclick="savePerson()">保存</button>
</div>


<hr>

<div id="results"></div>

<div id="detailModal" onclick="closeDetail()">
  <div id="detailContent"></div>
</div>

<script>
const API_BASE = "";

let allPersonsCache = [];

/* 全取得 */
async function loadAllPersons() {
  const res = await fetch("/persons");
  allPersonsCache = await res.json();
}

/* 検索 */
async function searchPersons() {
  const q = document.getElementById("search").value.trim();

  await loadAllPersons();

  let list = allPersonsCache;

  if (q) {
    list = list.filter(p =>
      (p.name && p.name.includes(q)) ||
      (p.yomi && p.yomi.includes(q)) ||
      (p.origin && p.origin.includes(q)) ||
      (p.description && p.description.includes(q))
    );
  }

  renderResults(list);
}


// ✅ オートコンプリート
function setupAutocomplete(inputId, boxId) {
  const input = document.getElementById(inputId);
  const box = document.getElementById(boxId);

  input.addEventListener("input", () => {

    const keyword = input.value.trim();

    if (!keyword) {
      box.style.display = "none";
      return;
    }

    const matches = allPersonsCache.filter(
      p => p.name && p.name.includes(keyword)
    );

    if (matches.length === 0) {
      box.style.display = "none";
      return;
    }

    box.innerHTML = matches.map(p => `
      <div class="autocomplete-item"
           onclick="selectPerson('${inputId}','${boxId}','${p.name}')">
        ${p.name}
        （${p.birth || "?"}-${p.death || "?"}／${p.affiliation || "所属不明"}）
      </div>
    `).join("");

    box.style.display = "block";
  });
}

function selectPerson(inputId, boxId, name) {
  document.getElementById(inputId).value = name;
  document.getElementById(boxId).style.display = "none";
}


/* 描画 */
function renderResults(list) {
  const box = document.getElementById("results");
  box.innerHTML = "";

  list.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.onclick = () => showDetail(p.id);

    div.innerHTML = `
      <div class="card-title">${p.name}</div>
      <div style="color:#666;">${p.yomi || ""}</div>

      <div style="margin-top:8px;">
        生年：${p.birth || "-"} / 没年：${p.death || "-"}
      </div>

      <button class="btn" onclick="event.stopPropagation(); showDetail(${p.id})">詳細</button>
      <button class="btn" onclick="event.stopPropagation(); editPerson(${p.id})">編集</button>
      <button class="btn" onclick="event.stopPropagation(); deletePerson(${p.id})">削除</button>
    `;
    box.appendChild(div);
  });
}

/* 詳細 */
async function showDetail(id) {
  const res = await fetch(`/person/${id}`);
  const p = await res.json();

  // ✅ 子供取得
  const childrenRes = await fetch(`/person/${id}/children`);
  const children = await childrenRes.json();

  // ✅ 兄弟姉妹取得
  const sibRes = await fetch(`/person/${id}/siblings`);
  const siblings = await sibRes.json();
  
  let fatherName = "-";
  let motherName = "-";

  if (p.father_id) {
    const fatherRes = await fetch(`/person/${p.father_id}`);
    const father = await fatherRes.json();
    fatherName = father.name;
  }

  if (p.mother_id) {
    const motherRes = await fetch(`/person/${p.mother_id}`);
    const mother = await motherRes.json();
    motherName = mother.name;
  }

  const childrenHtml = children.length
    ? children.map(c =>
        `<span class="link-like" onclick="showDetail(${c.id})">${c.name}</span>`
      ).join(", ")
    : "-";

  const siblingsHtml = siblings.length
    ? siblings.map(s =>
        `<span class="link-like" onclick="showDetail(${s.id})">${s.name}</span>`
      ).join(", ")
    : "-";

  document.getElementById("detailContent").innerHTML = `
    <h2>${p.name}</h2>
    <p style="color:#666;">${p.yomi || ""}</p>

    <hr>

    <p>生年：${p.birth || "-"}　没年：${p.death || "-"}</p>

    <h3>名前</h3>
    <p>
      幼名：${p.childhood_name || "-"}<br>
      諱：${p.imina || "-"}<br>
      通称：${p.tsusho || "-"}<br>
      法号：${p.hogou || "-"}
    </p>

    <h3>情報</h3>
    <p>
      出身：${p.origin || "-"}<br>
      分類：${p.category || "-"}<br>
      所属：${p.affiliation || "-"}<br>
      居城：${p.castle || "-"}<br>
      官位：${p.rank || "-"}<br>
      官職：${p.office || "-"}
    </p>

    <h3>説明</h3>
    <p>${(p.description || "").replace(/\n/g, "<br>")}</p>

    
    <h3>家族関係</h3>
    <p>
      父：
      ${
        p.father_id
          ? `<span class="link-like" onclick="showDetail(${p.father_id})">${fatherName}</span>`
          : "-"
      }
    </p>

    <p>
      母：
      ${
        p.mother_id
          ? `<span class="link-like" onclick="showDetail(${p.mother_id})">${motherName}</span>`
          : "-"
      }
    </p>

    <p>
      子供：
      ${childrenHtml}
    </p>

    <p>
      兄弟姉妹：
      ${siblingsHtml}
    </p>

    <button class="btn" onclick="closeDetail()">閉じる</button>
  `;

  document.getElementById("detailModal").style.display = "flex";
}

function closeDetail() {
  document.getElementById("detailModal").style.display = "none";
}

// ✅ ★ここに追加！！！！
async function editPerson(id) {
  const res = await fetch(`/person/${id}`);
  const p = await res.json();

  // 父の名前表示
  if (p.father_id) {
    const fatherRes = await fetch(`/person/${p.father_id}`);
    const father = await fatherRes.json();
    document.getElementById("father_name").value = father.name;
  } else {
    document.getElementById("father_name").value = "";
  }

  // 母の名前表示
  if (p.mother_id) {
    const motherRes = await fetch(`/person/${p.mother_id}`);
    const mother = await motherRes.json();
    document.getElementById("mother_name").value = mother.name;
  } else {
    document.getElementById("mother_name").value = "";
  }

  document.getElementById("personId").value = p.id;
  document.getElementById("name").value = p.name || "";
  document.getElementById("yomi").value = p.yomi || "";
  document.getElementById("birth").value = p.birth || "";
  document.getElementById("death").value = p.death || "";
  document.getElementById("childhood_name").value = p.childhood_name || "";
  document.getElementById("imina").value = p.imina || "";
  document.getElementById("tsusho").value = p.tsusho || "";
  document.getElementById("hogou").value = p.hogou || "";
  document.getElementById("origin").value = p.origin || "";
  document.getElementById("category").value = p.category || "";
  document.getElementById("affiliation").value = p.affiliation || "";
  document.getElementById("castle").value = p.castle || "";
  document.getElementById("rank").value = p.rank || "";
  document.getElementById("office").value = p.office || "";
  document.getElementById("history").value = p.history || "";
  document.getElementById("description").value = p.description || "";
  document.getElementById("source").value = (p.source || []).join(", ");
  document.getElementById("memo1").value = p.memo1 || "";
  document.getElementById("memo2").value = p.memo2 || "";
  document.getElementById("memo3").value = p.memo3 || "";
  document.getElementById("memo4").value = p.memo4 || "";
  document.getElementById("memo5").value = p.memo5 || "";
  document.getElementById("memo6").value = p.memo6 || "";
  document.getElementById("memo7").value = p.memo7 || "";
  document.getElementById("memo8").value = p.memo8 || "";
  document.getElementById("memo9").value = p.memo9 || "";
  document.getElementById("memo10").value = p.memo10 || "";
}

/* 保存 */
async function savePerson() {

  await loadAllPersons();

  const id = document.getElementById("personId").value;  // ★これ追加

  const source = document.getElementById("source").value
    ? document.getElementById("source").value
        .split(",")
        .map(s => s.trim())
        .filter(Boolean)
    : [];

  const fatherName = document.getElementById("father_name").value.trim();
  const motherName = document.getElementById("mother_name").value.trim();

  let father_id = null;
  let mother_id = null;

  // 父を検索
  const fatherPerson = allPersonsCache.find(
    p => p.name === fatherName
  );

  if (fatherPerson) {
    father_id = fatherPerson.id;
  }

  // 母を検索
  const motherPerson = allPersonsCache.find(
    p => p.name === motherName
  );

  if (motherPerson) {
    mother_id = motherPerson.id;
  }

  const data = {
    name: document.getElementById("name").value,
    yomi: document.getElementById("yomi").value,
    birth: document.getElementById("birth").value,
    death: document.getElementById("death").value,
    childhood_name: document.getElementById("childhood_name").value,
    imina: document.getElementById("imina").value,
    tsusho: document.getElementById("tsusho").value,
    hogou: document.getElementById("hogou").value,
    origin: document.getElementById("origin").value,
    category: document.getElementById("category").value,
    affiliation: document.getElementById("affiliation").value,
    castle: document.getElementById("castle").value,
    rank: document.getElementById("rank").value,
    office: document.getElementById("office").value,
    history: document.getElementById("history").value || null,
    description: document.getElementById("description").value,
    source: source,

    // ✅ ここが修正ポイント
    father_id: father_id,
    mother_id: mother_id,
    siblings: null,

    memo1: document.getElementById("memo1").value,
    memo2: document.getElementById("memo2").value,
    memo3: document.getElementById("memo3").value,
    memo4: document.getElementById("memo4").value,
    memo5: document.getElementById("memo5").value,
    memo6: document.getElementById("memo6").value,
    memo7: document.getElementById("memo7").value,
    memo8: document.getElementById("memo8").value,
    memo9: document.getElementById("memo9").value,
    memo10: document.getElementById("memo10").value,
  };

  if (!data.name) {
    alert("名前必須");
    return;
  }

  // ✅ ★ここが③（重要）
  const method = id ? "PUT" : "POST";
  const url = id ? `/person/${id}` : `/person`;

  const res = await fetch(url, {
    method: method,                          // ←ここも変更
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  if (!res.ok) {
    alert("保存失敗");
    return;
  }

  alert("保存OK");

  // ✅ 編集解除（重要）
  document.getElementById("personId").value = "";
  clearForm();
  searchPersons();



}

function clearForm() {
  document.getElementById("personId").value = "";
  document.getElementById("name").value = "";
  document.getElementById("yomi").value = "";
  document.getElementById("birth").value = "";
  document.getElementById("death").value = "";
  document.getElementById("childhood_name").value = "";
  document.getElementById("imina").value = "";
  document.getElementById("tsusho").value = "";
  document.getElementById("hogou").value = "";
  document.getElementById("origin").value = "";
  document.getElementById("category").value = "";
  document.getElementById("affiliation").value = "";
  document.getElementById("castle").value = "";
  document.getElementById("rank").value = "";
  document.getElementById("office").value = "";
  document.getElementById("description").value = "";
  document.getElementById("source").value = "";
  document.getElementById("father_name").value = "";
  document.getElementById("mother_name").value = "";
  document.getElementById("memo1").value = "";
  document.getElementById("memo2").value = "";
  document.getElementById("memo3").value = "";
  document.getElementById("memo4").value = "";
  document.getElementById("memo5").value = "";
  document.getElementById("memo6").value = "";
  document.getElementById("memo7").value = "";
  document.getElementById("memo8").value = "";
  document.getElementById("memo9").value = "";
  document.getElementById("memo10").value = "";
}

async function deletePerson(id) {
  if (!confirm("削除していい？")) return;

  const res = await fetch(`/person/${id}`, {
    method: "DELETE"
  });

  if (!res.ok) {
    alert("削除失敗");
    return;
  }

  alert("削除OK");

  searchPersons();  // 一覧更新
}

// ✅ ★ここに追加！！
function toggleMemo() {
  const box = document.getElementById("memoSection");

  if (box.style.display === "none") {
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

loadAllPersons().then(() => {
  setupAutocomplete("father_name", "father_suggest");
  setupAutocomplete("mother_name", "mother_suggest");
});

</script>

</body>
</html>
